
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Inventory Management</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #333; }
    form { margin-bottom: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
    label { display: block; margin-bottom: 5px; }
    input, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 3px; }
    button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; }
    button:hover { background-color: #218838; }
    .delete-btn { background-color: #dc3545; }
    .delete-btn:hover { background-color: #c82333; }
    .edit-btn { background-color: #007bff; }
    .edit-btn:hover { background-color: #0056b3; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>Book Inventory Management System</h1>

  <form id="addBookForm">
    <h2>Add New Book</h2>
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" required>

    <label for="isbn">ISBN:</label>
    <input type="text" id="isbn" name="isbn" required>

    <label for="author">Author:</label>
    <input type="text" id="author" name="author">

    <label for="genre">Genre:</label>
    <input type="text" id="genre" name="genre">

    <label for="price">Price:</label>
    <input type="number" id="price" name="price" min="0" max="9999" step="0.01">

    <label for="stock">Stock:</label>
    <input type="number" id="stock" name="stock" min="0">

    <label for="publishedYear">Published Year:</label>
    <input type="number" id="publishedYear" name="publishedYear" min="1000" max="2100">

    <button type="submit">Add Book</button>
  </form>

  <div id="message"></div>

  <h2>Book List</h2>
  <table id="booksTable">
    <thead>
      <tr>
        <th>Title</th>
        <th>ISBN</th>
        <th>Author</th>
        <th>Genre</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Published Year</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="booksBody">
    </tbody>
  </table>

  <script>
    const API_BASE = '/api/books';
    const form = document.getElementById('addBookForm');
    const booksBody = document.getElementById('booksBody');
    const messageDiv = document.getElementById('message');

    // Load books on page load
    document.addEventListener('DOMContentLoaded', loadBooks);

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const bookData = {
        title: formData.get('title'),
        isbn: formData.get('isbn'),
        author: formData.get('author'),
        genre: formData.get('genre'),
        price: parseFloat(formData.get('price')) || 0,
        stock: parseInt(formData.get('stock')) || 0,
        publishedYear: parseInt(formData.get('publishedYear')) || null
      };

      try {
        const response = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bookData)
        });

        if (response.ok) {
          showMessage('Book added successfully!', 'success');
          form.reset();
          loadBooks();
        } else {
          const error = await response.json();
          showMessage(error.error, 'error');
        }
      } catch (err) {
        showMessage('Error adding book', 'error');
      }
    });

    // Load and display books
    async function loadBooks() {
      try {
        const response = await fetch(API_BASE);
        const books = await response.json();
        displayBooks(books);
      } catch (err) {
        showMessage('Error loading books', 'error');
      }
    }

    function displayBooks(books) {
      booksBody.innerHTML = '';
      books.forEach(book => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${book.title}</td>
          <td>${book.isbn}</td>
          <td>${book.author || ''}</td>
          <td>${book.genre || ''}</td>
          <td class="price-cell" data-id="${book._id}">${book.price || 0}</td>
          <td class="stock-cell" data-id="${book._id}">${book.stock || 0}</td>
          <td>${book.publishedYear || ''}</td>
          <td>
            <button class="edit-btn" onclick="editField('${book._id}', 'price')">Edit Price</button>
            <button class="edit-btn" onclick="editField('${book._id}', 'stock')">Edit Stock</button>
            <button class="delete-btn" onclick="deleteBook('${book._id}')">Delete</button>
          </td>
        `;
        booksBody.appendChild(row);
      });
    }

    // Delete book
    async function deleteBook(id) {
      if (!confirm('Are you sure you want to delete this book?')) return;

      try {
        const response = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
        if (response.ok) {
          showMessage('Book deleted successfully!', 'success');
          loadBooks();
        } else {
          const error = await response.json();
          showMessage(error.error, 'error');
        }
      } catch (err) {
        showMessage('Error deleting book', 'error');
      }
    }

    // Inline editing
    function editField(id, field) {
      const cell = document.querySelector(`.${field}-cell[data-id="${id}"]`);
      const currentValue = cell.textContent;
      const input = document.createElement('input');
      input.type = field === 'price' ? 'number' : 'number';
      input.min = '0';
      input.step = field === 'price' ? '0.01' : '1';
      input.value = currentValue;
      input.style.width = '80px';

      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save';
      saveBtn.onclick = () => saveField(id, field, input.value);

      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => cell.innerHTML = currentValue;

      cell.innerHTML = '';
      cell.appendChild(input);
      cell.appendChild(saveBtn);
      cell.appendChild(cancelBtn);
    }

    async function saveField(id, field, value) {
      try {
        const updateData = { [field]: field === 'price' ? parseFloat(value) : parseInt(value) };
        const response = await fetch(`${API_BASE}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updateData)
        });

        if (response.ok) {
          showMessage(`${field} updated successfully!`, 'success');
          loadBooks();
        } else {
          const error = await response.json();
          showMessage(error.error, 'error');
        }
      } catch (err) {
        showMessage(`Error updating ${field}`, 'error');
      }
    }

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = type;
      setTimeout(() => messageDiv.textContent = '', 3000);
    }
  </script>
</body>
</html>
